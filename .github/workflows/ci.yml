name: CI/CD Pipeline
on: [push, pull_request]
jobs:
    unit-tests:
        runs-on: ubuntu-latest
        steps: 
            - name: Fetch repository
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup=node@v4
              with:
                node-version: '20'
                cache: 'npm'
            - name: Install dependencies
              run: |
                npm install
            - name: Run unit tests
              run: |
                NODE_ENV=test npm test

